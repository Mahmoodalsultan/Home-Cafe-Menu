<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Café Menu</title>
    <style>
        :root {
            --bg-color: #fdfbf7;
            --text-main: #2b1b11;
            --accent: #c48b5d;
            --metal: #8e8e8e;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .menu-container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 1s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .divider {
            height: 2px;
            width: 50px;
            background-color: var(--accent);
            margin: 0 auto;
        }

        .category {
            margin-bottom: 2.5rem;
        }

        h2 {
            font-size: 1.5rem;
            color: var(--metal);
            border-bottom: 1px solid #e0dcd3;
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
            animation: fadeIn 1.2s ease-out;
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1rem;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUpFade 0.6s ease-out forwards;
        }

        .menu-item:hover {
            color: var(--accent);
            transform: translateX(5px);
            transition: all 0.3s ease;
        }

        .item-name {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .item-dots {
            flex-grow: 1;
            border-bottom: 2px dotted #d1ccc0;
            margin: 0 10px;
            position: relative;
            top: -6px;
        }

        /* Motion Graphics / Keyframe Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Staggered animation delays for list items */
        .hot-drinks .menu-item:nth-child(2) { animation-delay: 0.1s; }
        .hot-drinks .menu-item:nth-child(3) { animation-delay: 0.2s; }
        .hot-drinks .menu-item:nth-child(4) { animation-delay: 0.3s; }
        .hot-drinks .menu-item:nth-child(5) { animation-delay: 0.4s; }
        .hot-drinks .menu-item:nth-child(6) { animation-delay: 0.5s; }
        .hot-drinks .menu-item:nth-child(7) { animation-delay: 0.6s; }
        .hot-drinks .menu-item:nth-child(8) { animation-delay: 0.7s; }
        .hot-drinks .menu-item:nth-child(9) { animation-delay: 0.8s; }
        .hot-drinks .menu-item:nth-child(10) { animation-delay: 0.9s; }
        .hot-drinks .menu-item:nth-child(11) { animation-delay: 1.0s; }
        .hot-drinks .menu-item:nth-child(12) { animation-delay: 1.1s; }

        .cold-drinks .menu-item:nth-child(2) { animation-delay: 0.6s; }
        .cold-drinks .menu-item:nth-child(3) { animation-delay: 0.7s; }
        .cold-drinks .menu-item:nth-child(4) { animation-delay: 0.8s; }
    </style>
</head>
<body>

    <div class="menu-container">
        <header>
            <h1>Café Reserve</h1>
            <div class="divider"></div>
        </header>

        <section class="category hot-drinks">
            <h2>Hot Drinks</h2>
            <div class="menu-item">
                <span class="item-name">Espresso (Single / Double)</span>
                <span class="item-dots"></span>
            </div>
            <div class="menu-item">
                <span class="item-name">Americano</span>
                <span class="item-dots"></span>
            </div>
            <div class="menu-item">
                <span class="item-name">Coffee</span>
                <span class="item-dots"></span>
            </div>
            <div class="menu-item">
                <span class="item-name">Flat White</span>
                <span class="item-dots"></span>
            </div>
            <div class="menu-item">
                <span class="item-name">Latte Macchiato</span>
                <span class="item-dots"></span>
            </div>
            <div class="menu-item">
                <span class="item-name">Cappuccino</span>
                <span class="item-dots"></span>
            </div>
            <div class="menu-item">
                <span class="item-name">Turkish Coffee</span>
                <span class="item-dots"></span>
            </div>
            <div class="menu-item">
                <span class="item-name">French Coffee</span>
                <span class="item-dots"></span>
            </div>
            <div class="menu-item">
                <span class="item-name">Greek Coffee</span>
                <span class="item-dots"></span>
            </div>
            <div class="menu-item">
                <span class="item-name">Café Péra Blend</span>
                <span class="item-dots"></span>
            </div>
            <div class="menu-item">
                <span class="item-name">Arabic Coffee</span>
                <span class="item-dots"></span>
            </div>
        </section>

        <section class="category cold-drinks">
            <h2>Cold Drinks</h2>
            <div class="menu-item">
                <span class="item-name">Espresso Cold</span>
                <span class="item-dots"></span>
            </div>
            <div class="menu-item">
                <span class="item-name">Cold Brew</span>
                <span class="item-dots"></span>
            </div>
            <div class="menu-item">
                <span class="item-name">Desert Velvet Iced</span>
                <span class="item-dots"></span>
            </div>
        </section>
    </div>

</body>
</html>
